# .github/workflows/deploy.yml
# Auto-deploys to tradeguard.tech when you push to main branch

name: Deploy TradeGuard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: srv1581524.hstgr.cloud
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/tradeguard/app
            bash deploy.sh
